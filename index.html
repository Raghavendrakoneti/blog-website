<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>My Blog 📝</h1>

<a href="/create"><button>Create New Post</button></a>

<div class="posts">
    {% for post in posts %}
        <div class="card">
            <h2>{{ post[1] }}</h2>
            <p>{{ post[2] }}</p>
            <a href="/delete/{{ post[0] }}"><button>Delete</button></a>
        </div>
    {% endfor %}
</div>

</body>
</html>
